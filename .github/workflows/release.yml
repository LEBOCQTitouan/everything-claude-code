name: Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Job 1: Validate tag and version consistency ──
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract and validate version
        if: github.event_name == 'push'
        id: meta
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "::error::Invalid tag format: $TAG_NAME (expected vX.Y.Z or vX.Y.Z-suffix)"
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Cargo.toml version matches tag
        if: github.event_name == 'push'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($VERSION)"
            echo "::error::Run scripts/bump-version.sh $VERSION to sync"
            exit 1
          fi

  # ── Job 2: Cross-compile for all platforms ──
  build:
    name: Build (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            artifact: ecc-darwin-arm64
            binary: ecc
            cross: false

          - target: x86_64-apple-darwin
            runner: macos-14
            artifact: ecc-darwin-x64
            binary: ecc
            cross: false

          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: ecc-linux-x64
            binary: ecc
            cross: false

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: ecc-linux-arm64
            binary: ecc
            cross: true

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: ecc-win32-x64
            binary: ecc.exe
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} -p ecc-cli -p ecc-workflow

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p ecc-cli -p ecc-workflow

      - name: Stage binaries
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          mkdir -p staging
          cp "target/${TARGET}/release/${BINARY}" staging/
          # Stage ecc-workflow alongside ecc (Unix targets only)
          WORKFLOW_BIN="target/${TARGET}/release/ecc-workflow"
          if [ -f "$WORKFLOW_BIN" ]; then
            cp "$WORKFLOW_BIN" staging/ecc-workflow
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: staging/
          if-no-files-found: error

  # ── Job 3: Create GitHub Release ──
  github-release:
    name: GitHub Release
    if: github.event_name == 'push'
    needs: [validate, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Package release tarballs with content
        run: |
          mkdir -p release-assets

          # Content directories to bundle alongside the binary
          CONTENT_DIRS="agents commands skills rules hooks contexts mcp-configs examples schemas"

          for pkg in ecc-darwin-arm64 ecc-darwin-x64 ecc-linux-x64 ecc-linux-arm64; do
            STAGING=$(mktemp -d)

            # Binaries (ecc + ecc-workflow)
            mkdir -p "$STAGING/bin"
            cp "artifacts/$pkg/ecc" "$STAGING/bin/ecc"
            chmod +x "$STAGING/bin/ecc"
            if [ -f "artifacts/$pkg/ecc-workflow" ]; then
              cp "artifacts/$pkg/ecc-workflow" "$STAGING/bin/ecc-workflow"
              chmod +x "$STAGING/bin/ecc-workflow"
            fi

            # Shell shims
            cp bin/ecc-hook "$STAGING/bin/ecc-hook"
            chmod +x "$STAGING/bin/ecc-hook"
            cp bin/ecc-shell-hook.sh "$STAGING/bin/ecc-shell-hook.sh"
            chmod +x "$STAGING/bin/ecc-shell-hook.sh"

            # Content files
            for dir in $CONTENT_DIRS; do
              if [ -d "$dir" ]; then
                cp -r "$dir" "$STAGING/$dir"
              fi
            done

            # Install script and support files
            cp install.sh "$STAGING/install.sh"
            chmod +x "$STAGING/install.sh"

            if [ -d scripts/hooks ]; then
              mkdir -p "$STAGING/scripts/hooks"
              cp -r scripts/hooks/. "$STAGING/scripts/hooks/"
            fi
            if [ -d scripts/codemaps ]; then
              mkdir -p "$STAGING/scripts/codemaps"
              cp -r scripts/codemaps/. "$STAGING/scripts/codemaps/"
            fi

            tar -czf "release-assets/$pkg.tar.gz" -C "$STAGING" .
            rm -rf "$STAGING"
          done

          # Windows zip (binary only — no shell shims)
          zip -j "release-assets/ecc-win32-x64.zip" "artifacts/ecc-win32-x64/ecc.exe"

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          sha256sum *.tar.gz *.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Sign release assets with cosign
        continue-on-error: true
        uses: sigstore/cosign-installer@v3
      - name: Cosign sign blobs
        continue-on-error: true
        run: |
          cd release-assets
          for asset in *.tar.gz *.zip; do
            cosign sign-blob "$asset" \
              --yes \
              --output-signature "${asset}.sig" \
              --output-certificate "${asset}.bundle" || true
          done

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          DELIMITER="COMMITS_END_$(date +%s)"
          echo "commits<<${DELIMITER}" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "${DELIMITER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        with:
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.commits }}

            ## Install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/LEBOCQTitouan/everything-claude-code/main/scripts/get-ecc.sh | bash
            ```

            Or download the tarball for your platform and extract to `~/.ecc/`.
          files: release-assets/*
          generate_release_notes: false
