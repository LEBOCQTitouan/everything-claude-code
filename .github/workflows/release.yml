# cargo-dist managed release workflow for ECC
# Generated structure based on cargo-dist conventions with custom cosign job
# See dist.toml for configuration

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Serialize releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Plan: Determine what to build ──
  plan:
    name: Plan Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: meta
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "::error::Invalid tag format: $TAG_NAME (expected vX.Y.Z or vX.Y.Z-suffix)"
            exit 1
          fi
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Cargo.toml version matches tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

  # ── Build: Cross-compile for all platforms ──
  build-local:
    name: Build (${{ matrix.target }})
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            artifact: ecc-aarch64-apple-darwin
            cross: false

          - target: x86_64-apple-darwin
            runner: macos-14
            artifact: ecc-x86_64-apple-darwin
            cross: false

          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: ecc-x86_64-unknown-linux-gnu
            cross: false

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: ecc-aarch64-unknown-linux-gnu
            cross: true

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: ecc-x86_64-pc-windows-msvc
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} -p ecc-cli -p ecc-workflow

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p ecc-cli -p ecc-workflow

      - name: Stage binaries
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p staging
          if [[ "$TARGET" == *"windows"* ]]; then
            cp "target/${TARGET}/release/ecc.exe" staging/
          else
            cp "target/${TARGET}/release/ecc" staging/
            if [ -f "target/${TARGET}/release/ecc-workflow" ]; then
              cp "target/${TARGET}/release/ecc-workflow" staging/
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: staging/
          if-no-files-found: error

  # ── Host: Package and publish release ──
  host:
    name: Host Release
    needs: [plan, build-local]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Package release archives
        run: |
          mkdir -p release-assets
          CONTENT_DIRS="agents commands skills rules hooks contexts mcp-configs examples schemas workflow-templates"

          for pkg in ecc-aarch64-apple-darwin ecc-x86_64-apple-darwin ecc-x86_64-unknown-linux-gnu ecc-aarch64-unknown-linux-gnu; do
            STAGING=$(mktemp -d)
            mkdir -p "$STAGING/bin"
            cp "artifacts/$pkg/ecc" "$STAGING/bin/ecc"
            chmod +x "$STAGING/bin/ecc"
            if [ -f "artifacts/$pkg/ecc-workflow" ]; then
              cp "artifacts/$pkg/ecc-workflow" "$STAGING/bin/ecc-workflow"
              chmod +x "$STAGING/bin/ecc-workflow"
            fi

            cp bin/ecc-hook "$STAGING/bin/ecc-hook"
            chmod +x "$STAGING/bin/ecc-hook"
            cp bin/ecc-shell-hook.sh "$STAGING/bin/ecc-shell-hook.sh"
            chmod +x "$STAGING/bin/ecc-shell-hook.sh"

            for dir in $CONTENT_DIRS; do
              if [ -d "$dir" ]; then
                cp -r "$dir" "$STAGING/$dir"
              fi
            done

            cp install.sh "$STAGING/install.sh"
            chmod +x "$STAGING/install.sh"

            if [ -d scripts/hooks ]; then
              mkdir -p "$STAGING/scripts/hooks"
              cp -r scripts/hooks/. "$STAGING/scripts/hooks/"
            fi
            if [ -d scripts/codemaps ]; then
              mkdir -p "$STAGING/scripts/codemaps"
              cp -r scripts/codemaps/. "$STAGING/scripts/codemaps/"
            fi

            tar -czf "release-assets/$pkg.tar.gz" -C "$STAGING" .
            rm -rf "$STAGING"
          done

          # Windows zip (binary only)
          zip -j "release-assets/ecc-x86_64-pc-windows-msvc.zip" "artifacts/ecc-x86_64-pc-windows-msvc/ecc.exe"

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          sha256sum *.tar.gz *.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          DELIMITER="COMMITS_END_$(date +%s)"
          echo "commits<<${DELIMITER}" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "${DELIMITER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ needs.plan.outputs.is_prerelease == 'true' }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.commits }}

            ## Install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/LEBOCQTitouan/everything-claude-code/main/scripts/get-ecc.sh | bash
            ```

            Or download the tarball for your platform and extract to `~/.ecc/`.
          files: release-assets/*
          generate_release_notes: false

  # ── Custom: Cosign signing (non-blocking) ──
  # Declared in dist.toml [plan.jobs.cosign-sign] for preservation across cargo-dist regeneration
  cosign-sign:
    name: Sign Release Assets
    needs: host
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release archives
        run: |
          mkdir -p signatures
          for asset in artifacts/**/*.tar.gz artifacts/**/*.zip; do
            if [ -f "$asset" ]; then
              BASENAME=$(basename "$asset")
              cosign sign-blob "$asset" \
                --yes \
                --output-signature "signatures/${BASENAME}.sig" \
                --output-certificate "signatures/${BASENAME}.bundle" || true
            fi
          done

      - name: Upload signatures
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          files: signatures/*
          tag_name: ${{ github.ref_name }}

  # ── Announce: Post-release notifications ──
  announce:
    name: Announce
    needs: [host, cosign-sign]
    if: always() && needs.host.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Release complete
        run: echo "Release ${{ github.ref_name }} published successfully"
