# ECC Template v0.1.0
# Claude Code PR Review — AI-assisted code review on pull requests
# Customize via environment variables: CLAUDE_MODEL, CLAUDE_MAX_TURNS, CLAUDE_ALLOWED_TOOLS, CLAUDE_PROMPT
name: Claude Code PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip fork PRs — secrets are not available for pull_request from forks
    if: github.event.pull_request.head.repo.fork != true
    steps:
      - name: Check API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not configured. Add it to your repository secrets."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_args: >-
            --allowedTools Read,Grep,Glob
            ${{ env.CLAUDE_MODEL && format('--model {0}', env.CLAUDE_MODEL) || '' }}
            ${{ env.CLAUDE_MAX_TURNS && format('--max-turns {0}', env.CLAUDE_MAX_TURNS) || '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || '' }}
          CLAUDE_MAX_TURNS: ${{ vars.CLAUDE_MAX_TURNS || '' }}
          CLAUDE_ALLOWED_TOOLS: ${{ vars.CLAUDE_ALLOWED_TOOLS || 'Read,Grep,Glob' }}
          CLAUDE_PROMPT: ${{ vars.CLAUDE_PROMPT || '' }}
